<!DOCTYPE html>
<!--
  Page de dernier recours (catastrophe : application non démarrée).
  Auto-suffisante, zéro dépendance : CSS inliné aux couleurs DSFR car un
  fichier statique de public/ ne peut pas résoudre les assets digérés par
  Propshaft. Les erreurs « normales » (exceptions applicatives) sont rendues
  par Portail::ErrorsController avec le vrai DSFR (cf. config.exceptions_app).
-->
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Erreur serveur — HubEE</title>
    <style>
      body { margin: 0; font-family: "Marianne", arial, sans-serif; color: #161616; background-color: #f6f6f6; }
      .container { max-width: 48rem; margin: 0 auto; padding: 4rem 1.5rem; }
      .brand { color: #000091; font-weight: 700; line-height: 1.1; margin-bottom: 2rem; }
      h1 { font-size: 2rem; margin: 0 0 1rem; }
      .lead { font-size: 1.25rem; color: #3a3a3a; }
      a.btn { display: inline-block; margin-top: 1.5rem; padding: 0.5rem 1.5rem; background-color: #000091; color: #fff; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="brand">République<br>Française</p>
      <h1>Une erreur est survenue</h1>
      <p class="lead">Le service rencontre un problème technique. Merci de réessayer ultérieurement.</p>
      <a class="btn" href="/">Retour à l'accueil</a>
    </div>
  </body>
</html>
