name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 5 * * *"

jobs:
  ci:
    name: Analyse statique & sécurité
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # La gem privée hub-api-v1 (source GitLab interne) est injoignable depuis un runner
      # public : on l'exclut du bundle. Seuls les steps statiques + sécurité tournent ici.
      BUNDLE_WITHOUT: hub_api_v1
      CI_STATIC_ONLY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: false

      - name: Installer les dépendances
        run: bundle install --jobs 4 --retry 3

      - name: Analyse statique & sécurité
        run: bin/ci
