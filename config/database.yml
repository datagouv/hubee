default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  <% if ENV["DB_HOST"] %>
  host: <%= ENV["DB_HOST"] %>
  username: postgres
  password: postgres
  <% end %>

development:
  <<: *default
  database: hubee_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: hubee_test

# En production, la connexion vient de 4 variables d'env dédiées : hôtes PG
# multiples séparés par des virgules, port, utilisateur, mot de passe.
# Transmises telles quelles à host:/port:, jamais via DATABASE_URL — libpq
# gère nativement les hôtes multiples reçus ainsi, alors que le parseur URI
# de Rails (déclencheur de la clé `url:`, y compris son auto-injection de
# DATABASE_URL pour la connexion "primary") rejette les virgules et fait
# planter le boot. Entre guillemets pour éviter que YAML lise
# "5432,5432,5432" comme l'entier 543254325432 (la virgule est un séparateur
# de milliers en YAML 1.1 dans un scalaire numérique non quoté).
production:
  primary: &primary_production
    <<: *default
    host: "<%= ENV["DATABASE_HOST"] %>"
    port: "<%= ENV["DATABASE_PORT"] %>"
    username: "<%= ENV["DATABASE_USERNAME"] %>"
    password: "<%= ENV["DATABASE_PASSWORD"] %>"
    database: hubee_production
  cache:
    <<: *primary_production
    database: hubee_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: hubee_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: hubee_production_cable
    migrations_paths: db/cable_migrate
